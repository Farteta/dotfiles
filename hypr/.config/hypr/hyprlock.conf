$font = JetBrainsMono Nerd Font
$wallpaper = /home/simon/Pictures/Wallpapers/f16c177ad884de53854ed09f451d8baf.jpg
$avatar = /home/simon/.config/hypr/lock-avatar-circle.png

general {
    disable_loading_bar = true
    hide_cursor = false
    grace = 2
}

animations {
    enabled = true
    bezier = ease, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 6, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 4
    blur_size = 6
}

image {
    monitor =
    path = $avatar
    size = 120
    rounding = 9999
    border_size = 3
    border_color = rgba(ffffff66)
    position = 0, 220
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $USER
    font_family = $font
    font_size = 20
    color = rgba(ffffffff)
    position = 0, 170
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.22
    dots_center = true
    inner_color = rgba(10151fcc)
    outer_color = rgba(87b8ffff)
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    font_color = rgba(eeeeeeff)
    fade_on_empty = false
    hide_input = false
    placeholder_text = Enter Password...
    fail_text = Wrong password
    capslock_color = rgba(f9e2afff)
    rounding = 16
    position = 0, 95
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_family = $font
    font_size = 112
    color = rgba(ffffffee)
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B %Y"
    font_family = $font
    font_size = 20
    color = rgba(ffffff99)
    position = 0, -86
    halign = center
    valign = center
}

label {
    monitor =
    text = Press ESC to clear input
    font_family = $font
    font_size = 14
    color = rgba(ffffff88)
    position = 0, 45
    halign = center
    valign = bottom
}
